<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Décomposition en facteurs premiers</title>
<style>
  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f4ef;
    --color-background-tertiary: #eeede8;
    --color-text-primary: #1a1a18;
    --color-text-secondary: #5f5e5a;
    --color-text-tertiary: #888780;
    --color-border-primary: rgba(0,0,0,0.4);
    --color-border-secondary: rgba(0,0,0,0.3);
    --color-border-tertiary: rgba(0,0,0,0.15);
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
    --font-sans: system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary: #1e1e1c;
      --color-background-secondary: #2a2a27;
      --color-background-tertiary: #333330;
      --color-text-primary: #e8e6de;
      --color-text-secondary: #9c9a92;
      --color-text-tertiary: #6e6d67;
      --color-border-primary: rgba(255,255,255,0.4);
      --color-border-secondary: rgba(255,255,255,0.3);
      --color-border-tertiary: rgba(255,255,255,0.15);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    font-size: 16px;
    background: var(--color-background-tertiary);
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .page {
    max-width: 820px;
    margin: 0 auto;
    background: var(--color-background-primary);
    border-radius: var(--border-radius-lg);
    border: 0.5px solid var(--color-border-tertiary);
    padding: 2rem;
  }
  .sheet { display: flex; flex-direction: column; gap: 1.25rem; }

  .input-row { display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap }
  .input-row input {
    width:100px;text-align:center;font-size:26px;font-weight:500;
    border:0.5px solid var(--color-border-secondary);border-radius:8px;
    padding:6px 10px;background:var(--color-background-primary);
    color:var(--color-text-primary)
  }
  .frac-sep { width:120px;height:2px;background:var(--color-text-primary) }
  .frac-stack { display:flex;flex-direction:column;align-items:center;gap:6px }
  .btn {
    padding:9px 22px;border-radius:8px;
    border:0.5px solid var(--color-border-secondary);
    background:var(--color-background-secondary);
    color:var(--color-text-primary);
    font-size:15px;font-weight:500;cursor:pointer
  }
  .btn:hover { background:var(--color-background-tertiary) }
  .btn:active { transform:scale(.97) }

  .legend {
    display:flex;gap:14px;flex-wrap:wrap;font-size:14px;
    color:var(--color-text-secondary);justify-content:center
  }
  .ldot {
    width:14px;height:14px;border-radius:3px;
    display:inline-block;vertical-align:middle;margin-right:4px
  }

  .decomp-cols { display:grid;grid-template-columns:1fr 1fr;gap:1rem }
  .decomp-box {
    border:0.5px solid var(--color-border-tertiary);border-radius:10px;
    padding:.85rem 1rem;background:var(--color-background-primary)
  }
  .decomp-title {
    font-size:15px;font-weight:500;color:var(--color-text-secondary);
    margin-bottom:.75rem;text-align:center
  }
  .potence { border-collapse:collapse;margin:0 auto;font-size:17px }
  .potence td { padding:3px 10px;color:var(--color-text-primary);line-height:1.5 }
  .potence td.q { text-align:right;min-width:52px;border-right:2px solid var(--color-text-primary) }
  .potence td.d { padding-left:12px;color:var(--color-text-secondary) }
  .potence tr:first-child td.d { border-bottom:2px solid var(--color-text-primary) }
  .potence tr.end td.q { color:var(--color-text-tertiary);font-style:italic }
  .decomp-result { margin-top:.65rem;font-size:15px;color:var(--color-text-secondary);text-align:center }
  .decomp-powers { margin-top:.4rem;padding-top:.4rem;border-top:0.5px dashed var(--color-border-tertiary);font-size:16px;font-weight:500;color:var(--color-text-primary);text-align:center }
  .decomp-powers sup { font-size:11px;vertical-align:super;line-height:0 }

  .fraction-section {
    border:0.5px solid var(--color-border-tertiary);border-radius:10px;
    padding:.9rem 1rem;background:var(--color-background-primary)
  }
  .section-label { font-size:14px;font-weight:500;color:var(--color-text-secondary);margin-bottom:.75rem }
  .frac-display { display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:20px }
  .frac-part { display:flex;flex-direction:column;align-items:center;gap:2px }
  .frac-num {
    border-bottom:2px solid var(--color-text-primary);padding-bottom:4px;
    display:flex;gap:7px;align-items:center;flex-wrap:wrap;
    justify-content:center;min-height:32px
  }
  .frac-den {
    padding-top:4px;display:flex;gap:7px;align-items:center;
    flex-wrap:wrap;justify-content:center;min-height:32px
  }
  .times { color:var(--color-text-tertiary);font-size:15px }
  .eq-sign { color:var(--color-text-tertiary);font-size:20px }

  .f-common {
    background:#FBEAF0;color:#993556;border:1.5px solid #993556;
    border-radius:6px;padding:2px 9px;font-size:18px;font-weight:500;white-space:nowrap
  }
  .f-num {
    background:#E6F1FB;color:#185FA5;border:1.5px solid #185FA5;
    border-radius:6px;padding:2px 9px;font-size:18px;font-weight:500;white-space:nowrap
  }
  .f-den {
    background:#EAF3DE;color:#3B6D11;border:1.5px solid #3B6D11;
    border-radius:6px;padding:2px 9px;font-size:18px;font-weight:500;white-space:nowrap
  }
  .f-common sup, .f-num sup, .f-den sup { font-size:11px;vertical-align:super;line-height:0 }

  .divider { border:none;border-top:0.5px solid var(--color-border-tertiary);margin:0 }

  .answer-row { display:flex;align-items:center;gap:16px;flex-wrap:wrap }
  .answer-label { font-size:15px;font-weight:500;color:var(--color-text-secondary) }
  .answer-box {
    border:2px dashed var(--color-border-secondary);border-radius:10px;
    padding:.75rem 1.75rem;min-width:150px;min-height:72px;
    display:flex;align-items:center;justify-content:center;
    font-size:28px;font-weight:500;color:var(--color-text-tertiary);
    cursor:text;outline:none
  }
  .answer-box:focus { border-color:var(--color-border-primary) }
  .empty { text-align:center;color:var(--color-text-tertiary);font-size:14px;padding:.4rem 0 }
</style>
</head>
<body>
<div class="page">
<div class="sheet">

  <div class="input-row">
    <div class="frac-stack">
      <input type="number" id="num" value="100" min="2" max="9999">
      <div class="frac-sep"></div>
      <input type="number" id="den" value="15" min="2" max="9999">
    </div>
    <button class="btn" onclick="compute()">Décomposer ↗</button>
  </div>

  <div class="legend" id="legend" style="display:none">
    <span><span class="ldot" style="background:#FBEAF0;border:1.5px solid #993556"></span>Facteur commun</span>
    <span><span class="ldot" style="background:#E6F1FB;border:1.5px solid #185FA5"></span>Facteur du numérateur</span>
    <span><span class="ldot" style="background:#EAF3DE;border:1.5px solid #3B6D11"></span>Facteur du dénominateur</span>
  </div>

  <div class="decomp-cols" id="decomp-cols">
    <div class="decomp-box"><div class="empty">—</div></div>
    <div class="decomp-box"><div class="empty">—</div></div>
  </div>

  <hr class="divider">

  <div class="fraction-section">
    <div class="section-label">Fraction après décomposition (avant simplification)</div>
    <div class="frac-display" id="frac-display">
      <div class="empty">Saisissez une fraction et cliquez sur Décomposer.</div>
    </div>
  </div>

  <hr class="divider">

  <div class="answer-row">
    <div class="answer-label">Fraction simplifiée :</div>
    <div class="answer-box" contenteditable="true" spellcheck="false" id="answer"></div>
  </div>

</div>
</div>

<script>
function primeFactors(n) {
  const steps = [], factors = [];
  let d = 2;
  while (n > 1) {
    if (n % d === 0) { steps.push([n, d]); factors.push(d); n = Math.floor(n / d); }
    else d++;
  }
  return { steps, factors };
}

function toPowers(factors) {
  const map = new Map();
  factors.forEach(f => map.set(f, (map.get(f) || 0) + 1));
  return [...map.entries()].map(([base, exp]) => ({ base, exp }));
}

function powersHTML(factors) {
  return toPowers(factors)
    .map(({ base, exp }) => exp > 1 ? `${base}<sup>${exp}</sup>` : `${base}`)
    .join(' × ');
}

function buildPotence(n, steps) {
  let html = `<table class="potence">`;
  steps.forEach(([quot, div], i) => {
    html += `<tr${i === steps.length - 1 ? ' class="end"' : ''}>
      <td class="q">${quot}</td><td class="d">${div}</td></tr>`;
  });
  html += `<tr class="end"><td class="q">1</td><td class="d"></td></tr></table>`;
  return html;
}

function powerBadges(factors, otherFactors, cls) {
  const otherCopy = [...otherFactors];
  const commonMap = new Map(), ownMap = new Map();

  factors.forEach(f => {
    const idx = otherCopy.indexOf(f);
    if (idx >= 0) {
      otherCopy.splice(idx, 1);
      commonMap.set(f, (commonMap.get(f) || 0) + 1);
    } else {
      ownMap.set(f, (ownMap.get(f) || 0) + 1);
    }
  });

  const t = '<span class="times">×</span>';
  const parts = [];
  const seen = new Set();

  factors.forEach(f => {
    if (seen.has(f)) return;
    seen.add(f);
    if (commonMap.has(f)) {
      const e = commonMap.get(f);
      parts.push(`<span class="f-common">${f}${e > 1 ? `<sup>${e}</sup>` : ''}</span>`);
    }
    if (ownMap.has(f)) {
      const e = ownMap.get(f);
      parts.push(`<span class="${cls}">${f}${e > 1 ? `<sup>${e}</sup>` : ''}</span>`);
    }
  });

  return parts.join(t);
}

function compute() {
  const n = parseInt(document.getElementById('num').value) || 100;
  const d = parseInt(document.getElementById('den').value) || 15;
  const N = primeFactors(n);
  const D = primeFactors(d);

  document.getElementById('decomp-cols').innerHTML = `
    <div class="decomp-box">
      <div class="decomp-title">Décomposition de ${n}</div>
      ${buildPotence(n, N.steps)}
      <div class="decomp-result">${n} = ${N.factors.join(' × ')}</div>
      <div class="decomp-powers">${n} = ${powersHTML(N.factors)}</div>
    </div>
    <div class="decomp-box">
      <div class="decomp-title">Décomposition de ${d}</div>
      ${buildPotence(d, D.steps)}
      <div class="decomp-result">${d} = ${D.factors.join(' × ')}</div>
      <div class="decomp-powers">${d} = ${powersHTML(D.factors)}</div>
    </div>`;

  const numB = powerBadges(N.factors, [...D.factors], 'f-num');
  const denB = powerBadges(D.factors, [...N.factors], 'f-den');

  document.getElementById('frac-display').innerHTML = `
    <div class="frac-part">
      <div class="frac-num" style="font-size:22px;font-weight:500;padding-bottom:4px;min-height:auto;min-width:50px;">${n}</div>
      <div class="frac-den" style="font-size:22px;font-weight:500;padding-top:4px;min-height:auto;min-width:50px;">${d}</div>
    </div>
    <span class="eq-sign">=</span>
    <div class="frac-part">
      <div class="frac-num">${numB}</div>
      <div class="frac-den">${denB}</div>
    </div>
    <span class="eq-sign">→ ?</span>`;

  document.getElementById('legend').style.display = 'flex';
  document.getElementById('answer').innerText = '';
  document.getElementById('answer').focus();
}

compute();
</script>
</body>
</html>
