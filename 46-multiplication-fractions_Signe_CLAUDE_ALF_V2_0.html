<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplication de fractions</title>
<style>
  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f4ef;
    --color-background-tertiary: #eeede8;
    --color-text-primary: #1a1a18;
    --color-text-secondary: #5f5e5a;
    --color-text-tertiary: #888780;
    --color-border-primary: rgba(0,0,0,0.4);
    --color-border-secondary: rgba(0,0,0,0.3);
    --color-border-tertiary: rgba(0,0,0,0.15);
    --border-radius-lg: 12px;
    --font-sans: system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) { :root {
    --color-background-primary: #1e1e1c;
    --color-background-secondary: #2a2a27;
    --color-background-tertiary: #333330;
    --color-text-primary: #e8e6de;
    --color-text-secondary: #9c9a92;
    --color-text-tertiary: #6e6d67;
    --color-border-primary: rgba(255,255,255,0.4);
    --color-border-secondary: rgba(255,255,255,0.3);
    --color-border-tertiary: rgba(255,255,255,0.15);
  }}
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    font-size: 16px;
    background: var(--color-background-tertiary);
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .page {
    max-width: 900px;
    margin: 0 auto;
    background: var(--color-background-primary);
    border-radius: var(--border-radius-lg);
    border: 0.5px solid var(--color-border-tertiary);
    padding: 2rem;
  }
  .sheet { display: flex; flex-direction: column; gap: 1.25rem; }

  /* ── Saisie ── */
  .input-row {
    display: flex; align-items: center; justify-content: center;
    gap: 20px; flex-wrap: wrap;
  }
  .frac-stack { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .frac-sep { width: 110px; height: 2px; background: var(--color-text-primary); }

  /* ligne num ou den avec signe + input */
  .num-row, .den-row {
    display: flex; align-items: center; gap: 6px;
  }
  .sign-btn {
    width: 32px; height: 36px;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: 6px;
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    font-size: 20px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background .15s;
    user-select: none;
  }
  .sign-btn.neg { background: #FBEAF0; color: #993556; border-color: #993556; }
  .sign-btn:hover { background: var(--color-background-tertiary); }
  .sign-btn.neg:hover { background: #f5d8e4; }

  .input-row input {
    width: 70px; text-align: center; font-size: 22px; font-weight: 500;
    border: 0.5px solid var(--color-border-secondary); border-radius: 8px;
    padding: 4px 8px; background: var(--color-background-primary); color: var(--color-text-primary);
  }
  .operator { font-size: 28px; font-weight: 500; color: var(--color-text-secondary); }
  .btn {
    padding: 9px 22px; border-radius: 8px; border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-secondary); color: var(--color-text-primary);
    font-size: 15px; font-weight: 500; cursor: pointer; margin-left: 20px;
  }
  .btn:hover { background: var(--color-background-tertiary); }
  .btn:active { transform: scale(.97); }

  /* ── Légende ── */
  .legend { display: flex; gap: 14px; flex-wrap: wrap; font-size: 14px; color: var(--color-text-secondary); justify-content: center; }
  .ldot { width: 14px; height: 14px; border-radius: 3px; display: inline-block; vertical-align: middle; margin-right: 4px; }

  /* ── Décompositions ── */
  .dcols { display: grid; grid-template-columns: repeat(auto-fit, minmax(175px, 1fr)); gap: 1rem; }
  .dbox { border: 0.5px solid var(--color-border-tertiary); border-radius: 10px; padding: .85rem 1rem; }
  .dtitle { font-size: 15px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: .75rem; text-align: center; }
  .potence { border-collapse: collapse; margin: 0 auto; font-size: 16px; }
  .potence td { padding: 2px 8px; color: var(--color-text-primary); line-height: 1.4; }
  .potence td.q { text-align: right; min-width: 40px; border-right: 2px solid var(--color-text-primary); }
  .potence td.d { padding-left: 12px; color: var(--color-text-secondary); }
  .potence tr:first-child td.d { border-bottom: 2px solid var(--color-text-primary); }
  .potence tr.end td.q { color: var(--color-text-tertiary); font-style: italic; }
  .dresult { margin-top: .65rem; font-size: 14px; color: var(--color-text-secondary); text-align: center; }

  /* ── Badges ── */
  .badge { border-radius: 6px; padding: 2px 9px; font-size: 16px; font-weight: 700; display: inline-block; }
  .fc { background: #FBEAF0; color: #993556; border: 1.5px solid #993556; text-decoration: line-through; opacity: .7; }
  .fn { background: #E6F1FB; color: #185FA5; border: 1.5px solid #185FA5; }
  .fd { background: #EAF3DE; color: #3B6D11; border: 1.5px solid #3B6D11; }

  /* ── Gestion des signes ── */
  .signs-section {
    border: 0.5px solid var(--color-border-tertiary); border-radius: 10px;
    padding: .9rem 1.2rem; display: flex; flex-direction: column; gap: .9rem;
  }
  .signs-label { font-size: 14px; font-weight: 500; color: var(--color-text-secondary); }
  .signs-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: .75rem;
  }
  .sign-box {
    border: 0.5px solid var(--color-border-tertiary); border-radius: 8px;
    padding: .6rem .9rem; display: flex; align-items: center; gap: 10px;
    flex-wrap: wrap; font-size: 15px; color: var(--color-text-secondary);
  }
  .sign-box .lbl { font-size: 13px; color: var(--color-text-tertiary); min-width: 90px; }
  .sign-chip {
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; border-radius: 6px;
    font-size: 18px; font-weight: 700; border: 1.5px solid;
  }
  .sign-chip.pos { background: #E6F1FB; color: #185FA5; border-color: #185FA5; }
  .sign-chip.neg { background: #FBEAF0; color: #993556; border-color: #993556; }

  .signs-rule {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: .6rem .9rem; border-radius: 8px;
    background: var(--color-background-secondary); font-size: 14px;
    color: var(--color-text-secondary);
  }
  .signs-rule .rule-count {
    font-weight: 600; color: var(--color-text-primary); font-size: 15px;
  }
  .result-sign-chip {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 2px 14px; border-radius: 6px;
    font-size: 20px; font-weight: 700; border: 2px solid;
  }
  .result-sign-chip.pos { background: #E6F1FB; color: #185FA5; border-color: #185FA5; }
  .result-sign-chip.neg { background: #FBEAF0; color: #993556; border-color: #993556; }

  /* ── Section calcul ── */
  .calc-section {
    border: 0.5px solid var(--color-border-tertiary); border-radius: 10px;
    padding: .9rem 1rem; display: flex; flex-direction: column; gap: 1.5rem;
  }
  .calc-label { font-size: 14px; font-weight: 500; color: var(--color-text-secondary); }

  /* ── Étape ── */
  .calc-step {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    font-size: 20px; justify-content: center;
  }

  /* ── Fraction bloc ── */
  .frac-part { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .frac-num {
    border-bottom: 2px solid var(--color-text-primary); padding-bottom: 4px;
    display: flex; gap: 7px; align-items: center; flex-wrap: wrap;
    justify-content: center; min-height: 32px; min-width: 40px;
  }
  .frac-den {
    padding-top: 4px; display: flex; gap: 7px; align-items: center;
    flex-wrap: wrap; justify-content: center; min-height: 32px; min-width: 40px;
  }
  /* signe devant une fraction */
  .frac-with-sign { display: inline-flex; align-items: center; gap: 4px; }
  .frac-sign { font-size: 26px; font-weight: 500; color: var(--color-text-primary); line-height: 1; }
  .frac-sign.neg { color: #993556; }

  .times { color: var(--color-text-tertiary); font-size: 15px; }
  .eq-sign { color: var(--color-text-tertiary); font-size: 20px; }
  .mult-sign { color: var(--color-text-primary); font-size: 24px; font-weight: 500; }

  .note { font-size: 13px; color: var(--color-text-tertiary); font-style: italic; }
  .simpbadge { display: inline-block; background: #FFF3CD; border: 1px solid #E6A817; color: #7A5800; border-radius: 6px; padding: 2px 10px; font-size: 14px; font-weight: 500; }

  /* ── Divider ── */
  .divider { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 0; }

  /* ── Réponse ── */
  .ansrow { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .anslabel { font-size: 15px; font-weight: 500; color: var(--color-text-secondary); }
  .ansbox {
    border: 2px dashed var(--color-border-secondary); border-radius: 10px;
    padding: .75rem 1.75rem; min-width: 150px; min-height: 72px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 500; color: var(--color-text-tertiary);
    cursor: text; outline: none;
  }
  .ansbox:focus { border-color: var(--color-border-primary); }
  .empty { text-align: center; color: var(--color-text-tertiary); font-size: 14px; padding: .4rem 0; }
</style>
</head>
<body>
<div class="page"><div class="sheet">

  <!-- ── Saisie ── -->
  <div class="input-row">

    <!-- Fraction 1 -->
    <div class="frac-stack">
      <div class="num-row">
        <button class="sign-btn" id="s_n1" onclick="toggleSign('s_n1')">+</button>
        <input type="number" id="n1" value="15" min="1" max="9999">
      </div>
      <div class="frac-sep"></div>
      <div class="den-row">
        <button class="sign-btn" id="s_d1" onclick="toggleSign('s_d1')">+</button>
        <input type="number" id="d1" value="14" min="1" max="9999">
      </div>
    </div>

    <div class="operator">×</div>

    <!-- Fraction 2 -->
    <div class="frac-stack">
      <div class="num-row">
        <button class="sign-btn" id="s_n2" onclick="toggleSign('s_n2')">+</button>
        <input type="number" id="n2" value="21" min="1" max="9999">
      </div>
      <div class="frac-sep"></div>
      <div class="den-row">
        <button class="sign-btn" id="s_d2" onclick="toggleSign('s_d2')">+</button>
        <input type="number" id="d2" value="10" min="1" max="9999">
      </div>
    </div>

    <button class="btn" onclick="compute()">Calculer ↗</button>
  </div>

  <!-- ── Légende ── -->
  <div class="legend" id="legend" style="display:none">
    <span><span class="ldot" style="background:#E6F1FB;border:1.5px solid #185FA5"></span>Conservé au numérateur</span>
    <span><span class="ldot" style="background:#EAF3DE;border:1.5px solid #3B6D11"></span>Conservé au dénominateur</span>
    <span><span class="ldot" style="background:#FBEAF0;border:1.5px solid #993556"></span>Simplifié (croisement num/den)</span>
  </div>

  <!-- ── Décompositions 4 termes ── -->
  <div class="dcols" id="dcols">
    <div class="dbox"><div class="empty">—</div></div>
    <div class="dbox"><div class="empty">—</div></div>
    <div class="dbox"><div class="empty">—</div></div>
    <div class="dbox"><div class="empty">—</div></div>
  </div>

  <!-- ── Gestion des signes ── -->
  <div class="signs-section" id="signs-section" style="display:none">
    <div class="signs-label">Gestion des signes</div>
    <div class="signs-grid" id="signs-grid"></div>
    <div class="signs-rule" id="signs-rule"></div>
  </div>

  <hr class="divider">

  <!-- ── Calcul ── -->
  <div class="calc-section" id="calc-section" style="display:none">
    <div class="calc-label">Calcul de la multiplication</div>
    <div id="calcsteps"></div>
  </div>

  <hr class="divider">

  <!-- ── Réponse ── -->
  <div class="ansrow">
    <div class="anslabel">Résultat simplifié :</div>
    <div class="ansbox" contenteditable="true" spellcheck="false" id="answer"></div>
  </div>

</div></div>

<script>
/* ── État des signes : +1 ou -1 ── */
const signs = { s_n1: 1, s_d1: 1, s_n2: 1, s_d2: 1 };

function toggleSign(id) {
  signs[id] *= -1;
  const btn = document.getElementById(id);
  if (signs[id] === -1) {
    btn.textContent = '−';
    btn.classList.add('neg');
  } else {
    btn.textContent = '+';
    btn.classList.remove('neg');
  }
}

/* ── Utilitaires ── */
function pf(n) {
  if (n <= 1) return { s: [], f: [1] };
  const s = [], f = []; let div = 2;
  while (n > 1) {
    if (n % div === 0) { s.push([n, div]); f.push(div); n = Math.floor(n / div); }
    else div++;
  }
  return { s, f };
}

function potence(steps) {
  if (!steps.length) return '<div class="note" style="text-align:center;padding:6px">1</div>';
  let h = '<table class="potence">';
  steps.forEach(([q, dv], i) => {
    h += `<tr${i === steps.length - 1 ? ' class="end"' : ''}><td class="q">${q}</td><td class="d">${dv}</td></tr>`;
  });
  return h + '<tr class="end"><td class="q">1</td><td class="d"></td></tr></table>';
}

/* ── Fraction bloc (valeurs absolues) ── */
function frac(num, den) {
  return `<div class="frac-part"><div class="frac-num">${num}</div><div class="frac-den">${den}</div></div>`;
}

/* ── Fraction avec signe devant ── */
function fracSigned(sign, num, den) {
  const symClass = sign < 0 ? 'neg' : '';
  const sym = sign < 0 ? '−' : '+';
  return `<div class="frac-with-sign">
    <span class="frac-sign ${symClass}">${sym}</span>
    ${frac(num, den)}
  </div>`;
}

/* ── Chip de signe ── */
function chip(val) {
  return val > 0
    ? '<span class="sign-chip pos">+</span>'
    : '<span class="sign-chip neg">−</span>';
}

const EQ = '<span class="eq-sign"> = </span>';
const T  = '<span class="times"> × </span>';
const MU = '<span class="mult-sign"> × </span>';

/* ── Calcul principal ── */
function compute() {
  const n1 = parseInt(document.getElementById('n1').value) || 15;
  const d1 = parseInt(document.getElementById('d1').value) || 14;
  const n2 = parseInt(document.getElementById('n2').value) || 21;
  const d2 = parseInt(document.getElementById('d2').value) || 10;

  const sn1 = signs.s_n1, sd1 = signs.s_d1;
  const sn2 = signs.s_n2, sd2 = signs.s_d2;

  /* Signe global : produit des 4 signes */
  const globalSign = sn1 * sd1 * sn2 * sd2;
  /* Signe de chaque fraction */
  const sf1 = sn1 * sd1, sf2 = sn2 * sd2;

  /* ── Décompositions (valeurs absolues) ── */
  const N1 = pf(n1), D1 = pf(d1), N2 = pf(n2), D2 = pf(d2);

  const buildBox = (title, val, sign, data) => `
    <div class="dbox">
      <div class="dtitle">${title} : ${sign < 0 ? '−' : '+'}${val}</div>
      ${potence(data.s)}
      <div class="dresult">${val} = ${data.f.join(' × ')}</div>
    </div>`;

  document.getElementById('dcols').innerHTML =
    buildBox('Numérateur 1', n1, sn1, N1) +
    buildBox('Dénominateur 1', d1, sd1, D1) +
    buildBox('Numérateur 2', n2, sn2, N2) +
    buildBox('Dénominateur 2', d2, sd2, D2);

  /* ── Gestion des signes ── */
  const negCount = [sn1, sd1, sn2, sd2].filter(s => s < 0).length;

  document.getElementById('signs-grid').innerHTML = `
    <div class="sign-box">
      <span class="lbl">Signe num. 1</span>
      ${chip(sn1)}
    </div>
    <div class="sign-box">
      <span class="lbl">Signe dén. 1</span>
      ${chip(sd1)}
    </div>
    <div class="sign-box">
      <span class="lbl">Signe num. 2</span>
      ${chip(sn2)}
    </div>
    <div class="sign-box">
      <span class="lbl">Signe dén. 2</span>
      ${chip(sd2)}
    </div>`;

  const ruleText = negCount === 0
    ? 'Aucun signe négatif → résultat positif'
    : negCount % 2 === 0
      ? `${negCount} signes négatifs (nombre pair) → résultat positif`
      : `${negCount} signe${negCount > 1 ? 's' : ''} négatif${negCount > 1 ? 's' : ''} (nombre impair) → résultat négatif`;

  const rsc = globalSign > 0 ? 'pos' : 'neg';
  const rss = globalSign > 0 ? '+' : '−';

  document.getElementById('signs-rule').innerHTML = `
    <span>${chip(sn1)} × ${chip(sd1)} × ${chip(sn2)} × ${chip(sd2)}</span>
    <span class="eq-sign">=</span>
    <span class="result-sign-chip ${rsc}">${rss}</span>
    <span class="rule-count" style="margin-left:8px">${ruleText}</span>`;

  document.getElementById('signs-section').style.display = 'flex';

  /* ── Simplification croisée (valeurs absolues) ── */
  let topFactors = [...N1.f, ...N2.f].filter(x => x !== 1);
  let botFactors = [...D1.f, ...D2.f].filter(x => x !== 1);
  if (!topFactors.length) topFactors = [1];
  if (!botFactors.length) botFactors = [1];

  const topUsed = new Array(topFactors.length).fill(false);
  const botUsed = new Array(botFactors.length).fill(false);

  for (let i = 0; i < topFactors.length; i++) {
    const idx = botFactors.findIndex((v, j) => v === topFactors[i] && !botUsed[j]);
    if (idx !== -1) { topUsed[i] = true; botUsed[idx] = true; }
  }

  let finalNum = 1, finalDen = 1;
  const topHtml = topFactors.map((f, i) => {
    if (topUsed[i]) return `<span class="badge fc">${f}</span>`;
    finalNum *= f;
    return `<span class="badge fn">${f}</span>`;
  });
  const botHtml = botFactors.map((f, i) => {
    if (botUsed[i]) return `<span class="badge fc">${f}</span>`;
    finalDen *= f;
    return `<span class="badge fd">${f}</span>`;
  });

  const simplified = topUsed.some(v => v);

  /* ── Étapes ── */
  let steps = '';

  // Étape 1 : fractions avec leur signe
  steps += `<div class="calc-step">
    ${fracSigned(sf1, n1, d1)} ${MU} ${fracSigned(sf2, n2, d2)}
    ${EQ}
    <div class="frac-with-sign">
      <span class="frac-sign ${globalSign < 0 ? 'neg' : ''}">${globalSign < 0 ? '−' : '+'}</span>
      ${frac(`${n1} ${T} ${n2}`, `${d1} ${T} ${d2}`)}
    </div>
  </div>`;

  // Étape 2 : décomposition avec badges
  steps += `<div class="calc-step">
    ${EQ}
    <div class="frac-with-sign">
      <span class="frac-sign ${globalSign < 0 ? 'neg' : ''}">${globalSign < 0 ? '−' : '+'}</span>
      ${frac(topHtml.join(T), botHtml.join(T))}
    </div>
    ${simplified
      ? '<span class="note">(simplification croisée num/den)</span>'
      : '<span class="note">(aucune simplification possible)</span>'}
  </div>`;

  // Étape 3 : résultat final
  const signStr = `<span class="frac-sign ${globalSign < 0 ? 'neg' : ''}">${globalSign < 0 ? '−' : '+'}</span>`;
  if (finalDen === 1) {
    steps += `<div class="calc-step">
      ${EQ}
      ${signStr}
      <span style="font-size:26px;font-weight:600">${finalNum}</span>
      <span class="simpbadge">résultat entier</span>
    </div>`;
  } else {
    steps += `<div class="calc-step">
      ${EQ}
      <div class="frac-with-sign">
        ${signStr}
        <div class="frac-part">
          <div class="frac-num" style="font-weight:600">${finalNum}</div>
          <div class="frac-den" style="font-weight:600">${finalDen}</div>
        </div>
      </div>
    </div>`;
  }

  document.getElementById('calcsteps').innerHTML = steps;
  document.getElementById('calc-section').style.display = 'flex';
  document.getElementById('legend').style.display = 'flex';
  document.getElementById('answer').innerText = '';
  document.getElementById('answer').focus();
}

compute();
</script>
</body>
</html>
