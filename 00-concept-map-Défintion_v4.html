        ex:null, rule:null }},

  { id:'d_frac', type:'leaf', parent:'defs', x:-250, y:530, label:['Fraction'], color:'#A78BFA', r:41,
    d:{ title:'Fraction', type:'Définition',
        formula:'a/b  (b ≠ 0)',
        rule:'a = numérateur (au-dessus)\nb = dénominateur (en-dessous)\nb ≠ 0 toujours.',
        desc:'Quotient de deux entiers a et b, avec b non nul. Représente une partie d\'un tout ou le résultat d\'une division. Toute fraction peut être simplifiée si pgcd(a,b) > 1.',
        ex:'3/4 : 3 parts sur 4\n7/1 = 7 (entier)\n0/5 = 0\n5/0 → impossible' }},

  { id:'d_nbp', type:'leaf', parent:'defs', x:-280, y:680, label:['Nombre','Premier'], color:'#A78BFA', r:41,
    d:{ title:'Nombre Premier', type:'Définition',
        formula:'p > 1  divisible\nuniquement par 1 et p',
        rule:'Liste à connaître :\n2, 3, 5, 7, 11, 13, 17, 19, 23…\n1 n\'est PAS premier.',
        desc:'Un nombre premier n\'a exactement que deux diviseurs : 1 et lui-même. Tout entier > 1 peut s\'écrire de façon unique comme produit de nombres premiers (théorème fondamental de l\'arithmétique).',
        ex:'7 → diviseurs : 1 et 7 ✓ premier\n9 → diviseurs : 1, 3, 9 ✗ composé\n2 → seul premier pair' }},

  { id:'d_puiss', type:'leaf', parent:'defs', x:-245, y:835, label:['Puissance'], color:'#A78BFA', r:41,
    d:{ title:'Puissance', type:'Définition',
        formula:'aⁿ = a × a × … × a\n      (n fois)',
        rule:'a⁰ = 1  (a ≠ 0)\na¹ = a\na⁻ⁿ = 1/aⁿ',
        desc:'aⁿ signifie que a est multiplié par lui-même n fois. n est l\'exposant, a est la base. L\'exposant peut être nul (résultat 1) ou négatif (passage au dénominateur).',
        ex:'2³ = 2×2×2 = 8\n(1/3)² = 1/9\n5⁰ = 1\n2⁻³ = 1/8' }},

  { id:'d_pgcd', type:'leaf', parent:'defs', x:-65, y:960, label:['PGCD','(définition)'], color:'#A78BFA', r:41,
    d:{ title:'PGCD — Définition', type:'Définition',
        formula:'pgcd(a,b) = plus grand\nentier divisant a et b',
        rule:'pgcd(a,b) = 1\n→ a et b sont premiers\n   entre eux.',
        desc:'Le Plus Grand Commun Diviseur de deux entiers a et b est le plus grand entier qui divise simultanément a et b. Sert à simplifier une fraction à sa forme irréductible.',
        ex:'pgcd(12, 18) :\ndiviseurs de 12 : 1,2,3,4,6,12\ndiviseurs de 18 : 1,2,3,6,9,18\n→ pgcd = 6' }},

  { id:'d_ppcm', type:'leaf', parent:'defs', x:100, y:1045, label:['PPCM','(définition)'], color:'#A78BFA', r:41,
    d:{ title:'PPCM — Définition', type:'Définition',
        formula:'ppcm(a,b) = plus petit\nmultiple commun à a et b',
        rule:'ppcm(a,b) = a×b / pgcd(a,b)\nToujours ≥ max(a,b).',
        desc:'Le Plus Petit Commun Multiple est le plus petit entier strictement positif qui est à la fois multiple de a et de b. C\'est le dénominateur commun minimal pour additionner deux fractions.',
        ex:'ppcm(4, 6) :\nmultiples de 4 : 4,8,12,16…\nmultiples de 6 : 6,12,18…\n→ ppcm = 12' }},

  { id:'d_decomp', type:'leaf', parent:'defs', x:-160, y:1020, label:['Décomp.','en nb premiers'], color:'#A78BFA', r:41,
    d:{ title:'Décomposition en Nb Premiers — Déf.', type:'Définition',
        formula:'Tout entier n > 1\n= produit de premiers\n(unique à l\'ordre près)',
        rule:'Méthode : diviser par 2, 3, 5, 7…\njusqu\'à quotient = 1.\nUnicité garantie (th. fondamental).',
        desc:'Le théorème fondamental de l\'arithmétique garantit qu\'il existe une seule façon d\'écrire un entier n > 1 comme produit de facteurs premiers (à l\'ordre des facteurs près). Base de toute simplification.',
        ex:'12 = 2² × 3\n30 = 2 × 3 × 5\n100 = 2² × 5²\n\nUnicité : 12 ne peut\ns\'écrire autrement' }},

  // ── RACINES leaf ────────────────────────────────────────
  { id:'t12', type:'leaf', parent:'racines', x:895, y:1048, label:['Type 12'], short:'√(a²/b²)', color:'#06B6D4', r:41,
    d:{ title:'Type 12 — Racine d\'une Fraction', type:'Racines de fractions',
        formula:'√(a²/b²) = √(a²)/√(b²)\n         = |a|/|b|',
        rule:'La racine s\'applique séparément\nau numérateur et au dénominateur.',
        desc:'Appliquer √ à chaque partie de la fraction, calculer les racines des carrés (valeurs absolues), puis simplifier la fraction obtenue.',
        ex:'√(36/16)\n= √36 / √16\n= 6/4\npgcd(6,4)=2\n= 3/2' }},
];

// ── EDGES ──────────────────────────────────────────────────
const EDGES = [
  // root → categories
  { f:'root', t:'ops',      w:2.5 },
  { f:'root', t:'nested',   w:2.5 },
  { f:'root', t:'powers',   w:2.5 },
  { f:'root', t:'priority', w:2.5 },
  { f:'root', t:'simplify', w:2.5 },
  { f:'root', t:'racines',  w:2.5 },
  { f:'root', t:'defs',     w:2.5 },
  // defs cat → leaves
  { f:'defs', t:'d_frac' }, { f:'defs', t:'d_nbp' }, { f:'defs', t:'d_puiss' },
  { f:'defs', t:'d_pgcd' }, { f:'defs', t:'d_ppcm' }, { f:'defs', t:'d_decomp' },
  // ops → leaves
  { f:'ops', t:'t4' }, { f:'ops', t:'t3' }, { f:'ops', t:'t8' },
  // nested → leaves
  { f:'nested', t:'t1' }, { f:'nested', t:'t6' },
  // powers → leaves
  { f:'powers', t:'t2' }, { f:'powers', t:'t9' }, { f:'powers', t:'t7' },
  { f:'powers', t:'t13' }, { f:'powers', t:'t5' },
  // priority → leaves
  { f:'priority', t:'t10' }, { f:'priority', t:'t11' }, { f:'priority', t:'t14' },
  // simplify → leaves
  { f:'simplify', t:'pgcd' }, { f:'simplify', t:'ppcm' }, { f:'simplify', t:'irred' },
  { f:'simplify', t:'decomp' }, { f:'simplify', t:'decomp_pow' },
  // racines → leaf
  { f:'racines', t:'t12' },
  // ── Liens transversaux ────────────────────────────────
  { f:'t3',   t:'t1',   dash:true },   // division → fraction composée
  { f:'t2',   t:'t9',   dash:true },   // puissance positive ↔ négative
  { f:'t5',   t:'t13',  dash:true },   // div même base ↔ prod même base
  { f:'pgcd', t:'irred',       dash:true },   // PGCD → irréductibilité
  { f:'ppcm', t:'t4',          dash:true },   // PPCM → addition
  { f:'ppcm', t:'t8',          dash:true },   // PPCM → somme d'inverses
  { f:'decomp', t:'pgcd',      dash:true },   // décomposition → PGCD
  { f:'decomp', t:'ppcm',      dash:true },   // décomposition → PPCM
  { f:'decomp_pow', t:'decomp',dash:true },   // décomp. avec puissances → décomp. simple
  { f:'decomp_pow', t:'pgcd',  dash:true },   // décomp. avec puissances → PGCD
  { f:'t14',  t:'t11',        dash:true },   // soustraction puis ÷  ↔  parenthèses puis ×
  // ── Liens Définitions → branches ────────────────────────
  { f:'d_frac',   t:'ops',       dash:true },   // fraction → opérations fondamentales
  { f:'d_frac',   t:'nested',    dash:true },   // fraction → fractions imbriquées
  { f:'d_nbp',    t:'decomp',    dash:true },   // nb premier → décomposition en premiers
  { f:'d_nbp',    t:'decomp_pow',dash:true },   // nb premier → décomposition avec puissances
  { f:'d_puiss',  t:'powers',    dash:true },   // puissance → catégorie puissances
  { f:'d_puiss',  t:'t2',        dash:true },   // puissance → type 2 (a/b)ⁿ
  { f:'d_pgcd',   t:'pgcd',      dash:true },   // def PGCD → outil PGCD
  { f:'d_pgcd',   t:'irred',     dash:true },   // def PGCD → irréductibilité
  { f:'d_ppcm',   t:'ppcm',      dash:true },   // def PPCM → outil PPCM
  { f:'d_ppcm',   t:'t4',        dash:true },   // def PPCM → type 4 (addition)
  { f:'d_decomp', t:'decomp',    dash:true },   // def décomp → outil décomp en premiers
  { f:'d_decomp', t:'decomp_pow',dash:true },   // def décomp → décomp avec puissances
];

// ═══════════════════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════════════════
const NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('map');
let T = { x:0, y:0, s:1 };
let dragging = false, ds = null;
let selId = null;

function el(tag, a={}) {
  const e = document.createElementNS(NS, tag);
  for(const [k,v] of Object.entries(a)) e.setAttribute(k, v);
  return e;
}
function byId(id) { return NODES.find(n=>n.id===id); }

function buildMap() {
  svg.innerHTML = '';
  const defs = el('defs');

  // root gradient
  const rg = el('radialGradient',{id:'rg',cx:'38%',cy:'33%',r:'65%'});
  [[0,'#e8c86a'],[100,'#96760f']].forEach(([o,c])=>{
    rg.appendChild(el('stop',{offset:`${o}%`,'stop-color':c}));
  });
  defs.appendChild(rg);
  svg.appendChild(defs);

  const G = el('g',{id:'g'});
  svg.appendChild(G);
  applyT();

  const EG = el('g'); G.appendChild(EG);
  const NG = el('g'); G.appendChild(NG);

  for(const e of EDGES) {
    const A = byId(e.f), B = byId(e.t);
    if(!A||!B) continue;
    const color = e.dash ? '#3a4a70' : (A.color||'#4a566e');
    EG.appendChild(el('path',{
      d: qcurve(A.x,A.y,B.x,B.y),
      fill:'none', stroke:color,
      'stroke-width': e.w||1.4,
      'stroke-opacity': e.dash ? 0.5 : 0.38,
      'stroke-dasharray': e.dash ? '7 5' : 'none',
    }));
  }

  for(const n of NODES) drawNode(NG, n);
}

function qcurve(x1,y1,x2,y2) {
  const mx=(x1+x2)/2, my=(y1+y2)/2;
  return `M ${x1} ${y1} Q ${mx} ${my} ${x2} ${y2}`;
}

function drawNode(parent, n) {
  const g = el('g',{'data-id':n.id});
  g.style.cursor = 'pointer';

  const isRoot = n.type==='root';
  const isLeaf = n.type==='leaf';
  const r = n.r;

  // glow ring
  let gring;
  if(isLeaf) {
    const w=r*2+6, h=r*1.35;
    gring = el('rect',{x:-(w/2+7), y:-(h/2+7), width:w+14, height:h+14, rx:13, fill:'none', stroke:n.color,'stroke-width':2,'stroke-opacity':0,class:'gring'});
  } else {
    gring = el('circle',{r:r+10, fill:'none', stroke:n.color,'stroke-width':2.5,'stroke-opacity':0,class:'gring'});
  }
  g.appendChild(gring);

  // bg shape
  let bg;
  if(isLeaf) {
    const w=r*2+6, h=r*1.35;
    bg = el('rect',{x:-w/2, y:-h/2, width:w, height:h, rx:8,
      fill:n.color,'fill-opacity':0.12, stroke:n.color,'stroke-width':1.4, class:'bg'});
  } else {
    bg = el('circle',{r:r,
      fill:isRoot?'url(#rg)':n.color,
      'fill-opacity':isRoot?1:0.15,
      stroke:n.color,'stroke-width':isRoot?3:2.2, class:'bg'});
  }
  g.appendChild(bg);

  // label
  const lines = n.label;
  const lh = isRoot ? 17.5 : (isLeaf ? 12 : 14);
  const sy = -(lh*(lines.length-1))/2 - (n.sub?lh*0.5:0) - (n.short?lh*0.5:0);

  lines.forEach((line,i)=>{
    const t = el('text',{
      x:0, y:sy+i*lh,
      'text-anchor':'middle','dominant-baseline':'middle',
      fill:isRoot?'#1a1205':'#e4dfc8',
      'font-family':"'Crimson Pro',Georgia,serif",
      'font-size':isRoot?16.5:(isLeaf?12:13),
      'font-weight':isRoot?600:(isLeaf?400:600),
    });
    t.textContent = line;
    g.appendChild(t);
  });

  if(n.sub) {
    const t = el('text',{x:0, y:sy+lines.length*lh+2, 'text-anchor':'middle','dominant-baseline':'middle',
      fill:isRoot?'#5a420e':'#6a7590','font-family':"'Fira Code',monospace",'font-size':7.5});
    t.textContent = n.sub; g.appendChild(t);
  }
  if(n.short) {
    const t = el('text',{x:0, y:sy+lines.length*lh+(n.sub?lh:3),
      'text-anchor':'middle','dominant-baseline':'middle',
      fill:n.color,'font-family':"'Fira Code',monospace",'font-size':8,'font-weight':500});
    t.textContent = n.short; g.appendChild(t);
  }

  g.setAttribute('transform',`translate(${n.x},${n.y})`);

  g.addEventListener('mouseenter',()=>{
    bg.setAttribute('fill-opacity', isRoot?1:(isLeaf?0.28:0.32));
    g.querySelector('.gring')?.setAttribute('stroke-opacity',0.38);
  });
  g.addEventListener('mouseleave',()=>{
    if(selId===n.id) return;
    bg.setAttribute('fill-opacity', isRoot?1:(isLeaf?0.12:0.15));
    g.querySelector('.gring')?.setAttribute('stroke-opacity',0);
  });
  g.addEventListener('click',e=>{e.stopPropagation(); select(n.id);});
  parent.appendChild(g);
}

// ═══════════════════════════════════════════════════════════
// SELECTION & PANEL
// ═══════════════════════════════════════════════════════════
function select(id) {
  deselect();
  selId = id;
  const n = byId(id);
  const el2 = document.querySelector(`[data-id="${id}"]`);
  el2?.querySelector('.bg')?.setAttribute('fill-opacity', n.type==='root'?1:0.45);
  el2?.querySelector('.gring')?.setAttribute('stroke-opacity',0.65);
  showPanel(n);
}
function deselect() {
  if(!selId) return;
  const n = byId(selId);
  const el2 = document.querySelector(`[data-id="${selId}"]`);
  el2?.querySelector('.bg')?.setAttribute('fill-opacity', n?.type==='root'?1:(n?.type==='leaf'?0.12:0.15));
  el2?.querySelector('.gring')?.setAttribute('stroke-opacity',0);
  selId = null;
}
function showPanel(n) {
  const d = n.d;
  document.getElementById('pBar').style.background = n.color;
  document.getElementById('pTitle').textContent = d.title;
  document.getElementById('pType').textContent = d.type;
  document.getElementById('pType').style.color = n.color;

  let html = '';
  if(d.formula) html += `<div><div class="p-sec-label">Formule</div>
    <div class="p-formula">${d.formula}</div></div>`;
  if(d.rule) html += `<div><div class="p-sec-label">Règle à retenir</div>
    <div class="p-rule">${d.rule}</div></div>`;
  if(d.desc) html += `<div><div class="p-sec-label">Explication</div>
    <div class="p-desc">${d.desc}</div></div>`;
  if(d.ex) html += `<div><div class="p-sec-label">Exemple</div>
    <div class="p-example" style="border-color:${n.color}">${d.ex}</div></div>`;

  document.getElementById('pBody').innerHTML = html;
  document.getElementById('panel').classList.add('open');
}
function closePanel() {
  deselect();
  document.getElementById('panel').classList.remove('open');
}
document.getElementById('pClose').addEventListener('click', closePanel);
document.getElementById('map-wrap').addEventListener('click', closePanel);

// ═══════════════════════════════════════════════════════════
// ZOOM / PAN
// ═══════════════════════════════════════════════════════════
function applyT() {
  const g = document.getElementById('g');
  if(g) g.setAttribute('transform',`translate(${T.x},${T.y}) scale(${T.s})`);
}
function center() {
  const c = document.getElementById('map-wrap');
  const cw=c.clientWidth, ch=c.clientHeight;
  const mapW=2350, mapH=1130;
  const s = Math.min(cw/mapW, ch/mapH)*0.89;
  // shift right by 200px (in map coords) to expose negative-x area
  T = { x:(cw-mapW*s)/2 + 180*s, y:(ch-mapH*s)/2 + 10*s, s };
  applyT();
}
document.getElementById('map-wrap').addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=document.getElementById('map-wrap').getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const d=e.deltaY>0?0.88:1.12;
  const ns=Math.max(0.2,Math.min(5,T.s*d));
  T.x=mx-(mx-T.x)*(ns/T.s); T.y=my-(my-T.y)*(ns/T.s); T.s=ns; applyT();
},{passive:false});

document.getElementById('map-wrap').addEventListener('mousedown',e=>{
  if(e.button===0){ dragging=true; ds={x:e.clientX-T.x,y:e.clientY-T.y}; }
});
document.addEventListener('mousemove',e=>{ if(dragging){T.x=e.clientX-ds.x;T.y=e.clientY-ds.y;applyT();} });
document.addEventListener('mouseup',()=>{ dragging=false; });

let ltd=null;
document.getElementById('map-wrap').addEventListener('touchstart',e=>{
  if(e.touches.length===1){dragging=true;ds={x:e.touches[0].clientX-T.x,y:e.touches[0].clientY-T.y};}
  if(e.touches.length===2) ltd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
},{passive:true});
document.getElementById('map-wrap').addEventListener('touchmove',e=>{
  if(e.touches.length===1&&dragging){T.x=e.touches[0].clientX-ds.x;T.y=e.touches[0].clientY-ds.y;applyT();}
  if(e.touches.length===2&&ltd){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);T.s=Math.max(0.2,Math.min(5,T.s*d/ltd));ltd=d;applyT();}
},{passive:true});
document.getElementById('map-wrap').addEventListener('touchend',()=>{dragging=false;ltd=null;});

document.getElementById('zIn').addEventListener('click',()=>{
  const c=document.getElementById('map-wrap');
  const cx=c.clientWidth/2,cy=c.clientHeight/2;
  const ns=Math.min(5,T.s*1.25);
  T.x=cx-(cx-T.x)*(ns/T.s);T.y=cy-(cy-T.y)*(ns/T.s);T.s=ns;applyT();
});
document.getElementById('zOut').addEventListener('click',()=>{
  const c=document.getElementById('map-wrap');
  const cx=c.clientWidth/2,cy=c.clientHeight/2;
  const ns=Math.max(0.2,T.s*0.8);
  T.x=cx-(cx-T.x)*(ns/T.s);T.y=cy-(cy-T.y)*(ns/T.s);T.s=ns;applyT();
});
document.getElementById('zReset').addEventListener('click',center);

// INIT
buildMap();
window.addEventListener('resize',center);
setTimeout(center,60);
</script>
</body>
</html>
